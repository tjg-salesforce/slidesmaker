<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SlidesMaker{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="container">
    <nav>
      <ul><li><strong>SlidesMaker</strong></li></ul>
      <ul>
        <li><a href="{{ url_for('admin.upload') }}">Upload</a></li>
        <li><a href="{{ url_for('admin.history') }}">History</a></li>
      </ul>
    </nav>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="{% if category == 'error' %}pico-color-red{% endif %}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
