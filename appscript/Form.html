<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 40px 20px; }
    .container { max-width: 700px; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px; }
    h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
    label { display: block; font-weight: 600; font-size: 14px; color: #333; margin-bottom: 6px; }
    input, textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; }
    input:focus, textarea:focus { outline: none; border-color: #0070d2; box-shadow: 0 0 0 2px rgba(0,112,210,0.15); }
    textarea { height: 280px; font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 12px; resize: vertical; }
    .row { display: flex; gap: 16px; margin-bottom: 16px; }
    .row > div { flex: 1; }
    .field { margin-bottom: 16px; }
    button { background: #0070d2; color: #fff; border: none; border-radius: 8px; padding: 12px 28px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px; }
    button:hover { background: #005fb2; }
    button:disabled { background: #999; cursor: not-allowed; }
    .result { margin-top: 20px; padding: 16px; border-radius: 8px; font-size: 14px; display: none; }
    .result.success { background: #e6f4ea; border: 1px solid #34a853; color: #1e7e34; }
    .result.error { background: #fce8e6; border: 1px solid #ea4335; color: #c5221f; }
    .result a { color: #0070d2; font-weight: 600; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>QBR Deck Generator</h1>
    <p class="subtitle">Paste the JSON payload from the Slack skill to generate a deck.</p>

    <div class="row">
      <div>
        <label for="email">Recipient Email</label>
        <input type="email" id="email" placeholder="ae@salesforce.com">
      </div>
      <div>
        <label for="title">Deck Title</label>
        <input type="text" id="title" placeholder="Q3 FY27 QBR — Customer Name">
      </div>
    </div>

    <div class="field">
      <label for="payload">JSON Payload (replacements)</label>
      <textarea id="payload" placeholder='{"customer_name": "Acme Corp", "cover_subtitle": "Q3 FY27 Partnership Review", ...}'></textarea>
    </div>

    <button id="btn" onclick="generate()">Generate Deck</button>

    <div id="result" class="result"></div>
  </div>

  <script>
    function generate() {
      var email = document.getElementById('email').value.trim();
      var title = document.getElementById('title').value.trim();
      var payload = document.getElementById('payload').value.trim();
      var btn = document.getElementById('btn');
      var result = document.getElementById('result');

      if (!email) { showError('Recipient email is required.'); return; }
      if (!payload) { showError('JSON payload is required.'); return; }

      try {
        JSON.parse(payload);
      } catch (e) {
        showError('Invalid JSON: ' + e.message);
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Generating deck...';
      result.style.display = 'none';

      google.script.run
        .withSuccessHandler(function(deckUrl) {
          btn.disabled = false;
          btn.textContent = 'Generate Deck';
          result.className = 'result success';
          result.innerHTML = 'Deck created: <a href="' + deckUrl + '" target="_blank">Open in Google Slides</a>';
          result.style.display = 'block';
        })
        .withFailureHandler(function(err) {
          btn.disabled = false;
          btn.textContent = 'Generate Deck';
          showError(err.message || 'Something went wrong.');
        })
        .generateFromForm(payload, email, title);
    }

    function showError(msg) {
      var result = document.getElementById('result');
      result.className = 'result error';
      result.textContent = msg;
      result.style.display = 'block';
    }
  </script>
</body>
</html>
